<!-- templates/base.html -->
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Библиотека{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>📚 Библиотека</h1>
        </div>
    </div>
    
    <div class="nav">
        <div class="container">
            <a href="/">🏠 Главная</a>
            <a href="/books/">📖 Все книги</a>
            <a href="/authors/">✍️ Все авторы</a>
            <a href="/genres/">🏷️ Все жанры</a>
             {% if user.is_authenticated %}
            <span style="color: #ffab91;">👤 {{ user.username }}</span>
            <a href="{% url 'logout' %}">🚪 Выйти</a>
        {% else %}
            <a href="{% url 'login' %}">🔐 Войти</a>
            <a href="{% url 'register' %}">📝 Регистрация</a>
        {% endif %}
            <a href="/admin/">⚙️ Админка</a>
        </div>
    </div>
    
    <div class="main container">
        {% block content %}{% endblock %}
    </div>
    
    <div class="footer">
        <div class="container">
            Библиотека &copy; 2025
        </div>
    </div>
</body>
</html>
